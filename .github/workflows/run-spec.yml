name: Run Spec

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Spec file or directory to run (default: tests/ = whole suite)'
        required: false
        default: 'tests/'
      branch:
        description: 'Branch to run against'
        required: false
        default: 'main'
      grep:
        description: 'Optional grep filter for individual journey'
        required: false
        default: ''
      correlation_id:
        description: 'Client-generated id to correlate this dispatch to its run (blank for manual dispatch)'
        required: false
        default: ''

run-name: Run Spec — ${{ inputs.spec_file }}${{ inputs.grep != '' && format(' [{0}]', inputs.grep) || '' }}${{ inputs.correlation_id != '' && format(' #{0}', inputs.correlation_id) || '' }}

jobs:
  run-spec:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Install git-lfs
        run: apt-get update && apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright spec
        env:
          HOME: /root
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json
        run: npx playwright test "${{ inputs.spec_file }}"${{ inputs.grep != '' && format(' --grep "{0}"', inputs.grep) || '' }} --reporter=json,line

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: test-results/results.json
          retention-days: 30

      - name: Upload report and results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-spec-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
