name: Baseline Refresh

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  baseline-refresh:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    permissions:
      contents: write

    steps:
      - name: Install git-lfs
        run: apt-get update && apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: npm ci

      - name: Refresh baselines
        continue-on-error: true
        run: npx playwright test --project=visual-chromium-desktop --project=visual-chromium-android --project=visual-webkit-desktop --project=visual-webkit-ios --update-snapshots

      - name: Push refreshed baselines to branch (no PR)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/baseline-refresh-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add tests/visual/
          if git diff --staged --quiet; then
            echo "::notice::No baseline changes"
          else
            git commit -m "Refresh baselines (run ${{ github.run_id }})"
            git push origin "$BRANCH"
            echo "::notice::Pushed branch $BRANCH — open a PR with: gh pr create --base main --head $BRANCH --title 'Baseline refresh — run ${{ github.run_id }}' --reviewer mcgras22"
          fi
