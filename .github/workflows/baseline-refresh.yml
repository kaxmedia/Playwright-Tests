name: Baseline Refresh

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  baseline-refresh:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Compute refresh date
        id: date
        run: echo "iso=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Refresh baselines
        continue-on-error: true
        run: npx playwright test --project=visual-chromium-desktop --project=visual-chromium-android --project=visual-webkit-desktop --project=visual-webkit-ios --update-snapshots

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/baseline-refresh-${{ github.run_id }}
          commit-message: 'chore: weekly baseline refresh'
          title: 'Weekly baseline refresh — ${{ steps.date.outputs.iso }}'
          body: |
            Automated weekly baseline refresh produced by `.github/workflows/baseline-refresh.yml`.

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## What this is

            The visual regression baselines for all 4 projects (chromium-desktop, chromium-android, webkit-desktop, webkit-ios) have been re-captured against the current live site. This runs weekly so baselines don't accumulate drift between feature PRs.

            ## How to review

            - Inspect the snapshot diffs in the **Files changed** tab. Each refreshed baseline replaces the prior committed PNG.
            - Most diffs should be benign content drift (operator rotation, copy updates, promotional banners).
            - **An unexpectedly large diff on a stable region** (header, footer, navigation, grid structure) may indicate a real layout regression — investigate before merging.
            - If the workflow run above shows tests still failing after `--update-snapshots`, that means the page itself failed to load or the test threw — re-run the workflow or refresh those baselines manually.

            ## Notes

            - `continue-on-error: true` is set on the test step, so this PR opens even if some baselines could not be captured.
            - Generated by `peter-evans/create-pull-request@v6` using the default `GITHUB_TOKEN`. CI will **not** run automatically on this PR — close and re-open, or push an empty commit, to trigger checks if you need verification before merge.
          labels: |
            baseline-refresh
            automated
          team-reviewers: qa
