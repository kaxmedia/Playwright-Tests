name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Capture new baselines and upload as artifact'
        type: boolean
        default: false
      correlation_id:
        description: 'Client-generated id to correlate this dispatch to its run (blank for manual dispatch)'
        required: false
        default: ''

run-name: "Visual Regression${{ inputs.correlation_id != '' && format(' #{0}', inputs.correlation_id) || '' }}"

# Auto-cancel superseded runs on the same ref so pushes/reopens don't leave
# long (~78 min) visual runs stacking up and competing for runners.
concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Install git-lfs
        run: apt-get update && apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install dependencies
        run: npm ci

      - name: Run visual regression tests
        env:
          # Emit a machine-readable JSON report alongside the HTML one so the dashboard can
          # ingest per-page/project pass/fail + diff-image attachment paths. The diff PNGs
          # themselves live under test-results/ (uploaded by the failure step below).
          PLAYWRIGHT_JSON_OUTPUT_NAME: visual-results.json
        run: npx playwright test --project=visual-chromium-desktop --project=visual-chromium-android --project=visual-webkit-desktop --project=visual-webkit-ios --reporter=html,json ${{ inputs.update_baselines && '--update-snapshots' || '' }}

      # Publish the JSON report on every comparison run (pass or fail) so the dashboard has
      # per-page status each time — not only on failure. Skipped for baseline-capture runs
      # (update_baselines), which don't compare. `always()` so a failing run still uploads it.
      - name: Upload visual results JSON
        if: ${{ always() && !inputs.update_baselines }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-results-json
          path: visual-results.json
          retention-days: 30
          if-no-files-found: warn

      - name: Upload baselines
        if: ${{ always() && inputs.update_baselines }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/**-snapshots/
          retention-days: 30

      - name: Upload report and results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
