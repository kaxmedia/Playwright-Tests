name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Capture new baselines and upload as artifact'
        type: boolean
        default: false

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run visual regression tests
        run: npx playwright test --project=visual-chromium-desktop --project=visual-webkit-desktop --project=visual-chromium-android --project=visual-webkit-ios ${{ inputs.update_baselines && '--update-snapshots' || '' }}

      - name: Upload baselines
        if: ${{ always() && inputs.update_baselines }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/visual/**-snapshots/
          retention-days: 30

      - name: Upload report and results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
